<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITA — Note Printer</title>
<style>
  :root{
    --paper:#fff8ef;
    --ink:#2b2420;
    --clay:#b5502e;
    --line:#d8cdbd;
    --muted:#8a7d6d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#221c17;
    color:var(--ink);
    font-family:'Courier New', monospace;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 14px 60px;
  }
  .card{
    width:100%;
    max-width:420px;
  }
  h1{
    font-size:15px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#e8dcc8;
    text-align:center;
    margin:0 0 4px;
  }
  .sub{
    text-align:center;
    color:#a4937b;
    font-size:11px;
    margin:0 0 20px;
    letter-spacing:1px;
  }
  label{
    display:block;
    color:#c9bda8;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    margin:16px 0 6px;
  }
  select, textarea, input[type=text]{
    width:100%;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:3px;
    padding:10px;
    font-family:'Courier New', monospace;
    font-size:14px;
    color:var(--ink);
  }
  textarea{
    resize:vertical;
    min-height:90px;
    line-height:1.5;
  }
  .row{display:flex; gap:10px;}
  .row > div{flex:1;}

  /* receipt preview */
  .receipt-wrap{
    margin-top:22px;
    background:#161310;
    padding:18px 0;
    border-radius:4px;
  }
  .receipt{
    background:var(--paper);
    width:260px;
    margin:0 auto;
    padding:22px 16px 26px;
    box-shadow:0 4px 18px rgba(0,0,0,.45);
    position:relative;
  }
  .receipt::before, .receipt::after{
    content:"";
    position:absolute;
    left:0; right:0;
    height:8px;
    background:
      linear-gradient(135deg, var(--paper) 50%, transparent 50%) 0 0/10px 10px repeat-x,
      linear-gradient(-135deg, var(--paper) 50%, transparent 50%) 0 0/10px 10px repeat-x;
    background-color:#221c17;
  }
  .receipt::before{ top:-8px; }
  .receipt::after{ bottom:-8px; transform:rotate(180deg); }
  #preview{
    white-space:pre-wrap;
    word-break:break-word;
    color:#3a3128;
    line-height:1.6;
  }
  .center{text-align:center;}
  .right{text-align:right;}

  button{
    margin-top:24px;
    width:100%;
    background:var(--clay);
    color:#fff8ef;
    border:none;
    padding:15px;
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    border-radius:3px;
    font-family:'Courier New', monospace;
    cursor:pointer;
  }
  button:active{ opacity:0.85; }
  .hint{
    color:#7a6d5c;
    font-size:11px;
    text-align:center;
    margin-top:10px;
    line-height:1.5;
  }
</style>
</head>
<body>
<div class="card">
  <h1>SITA</h1>
  <p class="sub">Custom Note Printer</p>

  <label for="msg">Message</label>
  <textarea id="msg" oninput="render()">
Thank you — SITA</textarea>

  <div class="row">
    <div>
      <label for="align">Alignment</label>
      <select id="align" onchange="render()">
        <option value="center" selected>Center</option>
        <option value="left">Left</option>
      </select>
    </div>
    <div>
      <label for="size">Text size</label>
      <select id="size" onchange="render()">
        <option value="24px">Normal</option>
        <option value="34px" selected>Large</option>
        <option value="46px">Extra large</option>
      </select>
    </div>
  </div>

  <div class="receipt-wrap">
    <div class="receipt">
      <div id="preview" class="center"></div>
    </div>
  </div>

  <button onclick="doPrint()">Print Note</button>
  <p class="hint">Opens PassPRNT and sends this note straight to the kitchen printer.</p>
</div>

<script>
function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function render(){
  const msg = document.getElementById('msg').value;
  const align = document.getElementById('align').value;
  const size = document.getElementById('size').value;
  const preview = document.getElementById('preview');
  preview.className = align;
  preview.style.fontSize = size;
  preview.innerHTML = escapeHtml(msg).replace(/\n/g,'<br>');
}

function buildHtml(){
  const msg = document.getElementById('msg').value;
  const align = document.getElementById('align').value;
  const size = document.getElementById('size').value;
  const body = escapeHtml(msg).replace(/\n/g,'<br>');
  return '<html><head><meta charset="utf-8"></head>'
    + '<body style="font-family:\'Courier New\',monospace; text-align:' + align + '; padding:6px;">'
    + '<span style="font-size:' + size + ' !important; line-height:1.4;">' + body + '</span>'
    + '<br><br></body></html>';
}

function doPrint(){
  const html = buildHtml();
  const uri = 'starpassprnt://v1/print/nopreview?'
    + 'back=' + encodeURIComponent(window.location.href)
    + '&html=' + encodeURIComponent(html);
  window.location.href = uri;
}

render();
</script>
</body>
</html>
